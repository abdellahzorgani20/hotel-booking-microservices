<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mes Réservations - HotelBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-4">
    <div id="alert-container"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold"><i class="bi bi-calendar-check me-2 text-primary"></i>Mes Réservations</h2>
      <a href="/hotels.html" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Nouvelle réservation
      </a>
    </div>
    <div class="card shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr>
              <th>#ID</th>
              <th>Hôtel / Chambre</th>
              <th>Arrivée</th>
              <th>Départ</th>
              <th>Durée</th>
              <th>Total</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="bookings-container">
            <tr>
              <td colspan="7" class="text-center py-4">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/bookings.js"></script>
</body>

</html>
