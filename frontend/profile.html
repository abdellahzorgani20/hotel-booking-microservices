<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mon Profil - HotelBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center g-4">

      <!-- Informations personnelles -->
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-5"></i>
            <span class="fw-semibold">Informations personnelles</span>
          </div>
          <div class="card-body p-4">
            <div id="profile-alert"></div>
            <div id="profile-skeleton">
              <div class="placeholder-glow mb-3">
                <span class="placeholder col-4 mb-1"></span>
                <span class="placeholder col-12" style="height:38px;border-radius:6px"></span>
              </div>
              <div class="placeholder-glow mb-3">
                <span class="placeholder col-3 mb-1"></span>
                <span class="placeholder col-12" style="height:38px;border-radius:6px"></span>
              </div>
              <div class="placeholder-glow mb-3">
                <span class="placeholder col-2 mb-1"></span>
                <span class="placeholder col-6" style="height:28px;border-radius:6px"></span>
              </div>
              <span class="placeholder col-12 btn disabled" style="height:38px;border-radius:6px"></span>
            </div>
            <form id="profile-form" style="display:none">
              <div class="mb-3">
                <label class="form-label fw-semibold">Nom d'utilisateur</label>
                <input type="text" id="profile-username" name="username" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Adresse e-mail</label>
                <input type="email" id="profile-email" name="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Rôle</label>
                <div><span id="profile-role-badge" class="badge fs-6"></span></div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold text-muted small">Membre depuis</label>
                <div id="profile-joined" class="text-muted small"></div>
              </div>
              <button type="submit" id="profile-save-btn" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-floppy me-1"></i>Enregistrer les modifications
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Changer le mot de passe -->
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white d-flex align-items-center gap-2">
            <i class="bi bi-shield-lock fs-5"></i>
            <span class="fw-semibold">Changer le mot de passe</span>
          </div>
          <div class="card-body p-4">
            <div id="password-alert"></div>
            <form id="password-form">
              <div class="mb-3">
                <label class="form-label fw-semibold">Mot de passe actuel</label>
                <div class="input-group">
                  <input type="password" name="old_password" id="old-password" class="form-control" required
                    placeholder="••••••••">
                  <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="old-password"><i
                      class="bi bi-eye"></i></button>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Nouveau mot de passe</label>
                <div class="input-group">
                  <input type="password" name="new_password" id="new-password" class="form-control" required
                    placeholder="8 caractères minimum" minlength="8">
                  <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="new-password"><i
                      class="bi bi-eye"></i></button>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Confirmer le nouveau mot de passe</label>
                <div class="input-group">
                  <input type="password" name="new_password2" id="new-password2" class="form-control" required
                    placeholder="Répéter le mot de passe" minlength="8">
                  <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="new-password2"><i
                      class="bi bi-eye"></i></button>
                </div>
              </div>
              <div class="mb-3">
                <div class="d-flex justify-content-between mb-1">
                  <small class="text-muted">Force du mot de passe</small>
                  <small id="strength-label" class="text-muted">—</small>
                </div>
                <div class="progress" style="height:6px">
                  <div id="strength-bar" class="progress-bar" role="progressbar" style="width:0%"></div>
                </div>
              </div>
              <button type="submit" id="pw-save-btn" class="btn btn-warning w-100 fw-semibold">
                <i class="bi bi-lock me-1"></i>Mettre à jour le mot de passe
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/profile.js"></script>
</body>

</html>
