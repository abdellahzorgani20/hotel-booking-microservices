<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion - HotelBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-body p-4">
            <ul class="nav nav-tabs mb-4">
              <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-tab">
                  <i class="bi bi-box-arrow-in-right me-1"></i>Connexion
                </button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register-tab">
                  <i class="bi bi-person-plus me-1"></i>Inscription
                </button>
              </li>
            </ul>
            <div id="alert-container"></div>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="login-tab">
                <form id="login-form">
                  <div class="mb-3">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" name="email" class="form-control" required placeholder="vous@exemple.com">
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                  </div>
                  <button type="submit" class="btn btn-primary w-100 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
                  </button>
                </form>
              </div>
              <div class="tab-pane fade" id="register-tab">
                <form id="register-form">
                  <div class="mb-3">
                    <label class="form-label fw-semibold">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" required
                      placeholder="votre nom d'utilisateur">
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" name="email" class="form-control" required placeholder="vous@exemple.com">
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required
                      placeholder="8 caractères minimum">
                  </div>
                  <div class="mb-3">
                    <label class="form-label fw-semibold">Confirmer le mot de passe</label>
                    <input type="password" name="password2" class="form-control" required
                      placeholder="Répéter le mot de passe">
                  </div>
                  <button type="submit" class="btn btn-success w-100 fw-semibold">
                    <i class="bi bi-person-check me-1"></i>Créer un compte
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
